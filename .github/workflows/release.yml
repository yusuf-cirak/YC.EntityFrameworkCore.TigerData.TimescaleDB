name: Release

on:
  push:
    branches: [master]

permissions:
  contents: write
  pull-requests: write
  id-token: write  # OIDC token for NuGet Trusted Publishing

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          target-branch: master

      # The steps below run only when a release PR was just merged and a release/tag was created.
      - uses: actions/checkout@v4
        if: ${{ steps.release.outputs.release_created == 'true' }}

      - uses: actions/setup-dotnet@v5
        if: ${{ steps.release.outputs.release_created == 'true' }}
        with:
          global-json-file: global.json

      - name: Pack
        if: ${{ steps.release.outputs.release_created == 'true' }}
        run: |
          dotnet restore YC.EntityFrameworkCore.TigerData.TimescaleDB.slnx
          dotnet build YC.EntityFrameworkCore.TigerData.TimescaleDB.slnx --no-restore --configuration Release
          dotnet pack YC.EntityFrameworkCore.TigerData.TimescaleDB.slnx --no-build --configuration Release --output artifacts

      # Trusted Publishing: exchange the GitHub OIDC token for a short-lived nuget.org API key.
      # Requires a trusted publishing policy on nuget.org (Owner: yusuf-cirak, Repo:
      # YC.EntityFrameworkCore.TigerData.TimescaleDB, Workflow: release.yml) and a NUGET_USER
      # secret holding the nuget.org profile name. No long-lived API key needed.
      - name: NuGet login (OIDC → temporary API key)
        if: ${{ steps.release.outputs.release_created == 'true' }}
        id: nuget-login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet
        if: ${{ steps.release.outputs.release_created == 'true' }}
        run: >
          dotnet nuget push "artifacts/*.nupkg"
          --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
