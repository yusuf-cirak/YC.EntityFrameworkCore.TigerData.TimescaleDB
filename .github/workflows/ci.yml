name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore YC.EntityFrameworkCore.TigerData.TimescaleDB.slnx

      - name: Build
        run: dotnet build YC.EntityFrameworkCore.TigerData.TimescaleDB.slnx --no-restore --configuration Release

      - name: Unit tests
        run: >
          dotnet test test/YC.EntityFrameworkCore.TigerData.TimescaleDB.UnitTests
          --no-build --configuration Release
          --collect:"XPlat Code Coverage" --results-directory coverage

      - name: Functional tests (Testcontainers, TimescaleDB pg17)
        run: >
          dotnet test test/YC.EntityFrameworkCore.TigerData.TimescaleDB.FunctionalTests
          --no-build --configuration Release
          --collect:"XPlat Code Coverage" --results-directory coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/**/coverage.cobertura.xml
          fail_ci_if_error: false

      - name: Pack
        run: >
          dotnet pack YC.EntityFrameworkCore.TigerData.TimescaleDB.slnx
          --no-build --configuration Release --output artifacts

      - uses: actions/upload-artifact@v7
        with:
          name: nuget-packages
          path: artifacts/*.nupkg
