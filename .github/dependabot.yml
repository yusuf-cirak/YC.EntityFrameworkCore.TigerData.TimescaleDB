version: 2
updates:
  # NuGet dependencies (Central Package Management: Directory.Packages.props)
  - package-ecosystem: nuget
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: "chore(deps)"
    groups:
      nuget-minor-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions used by the CI / Release workflows
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: "ci(deps)"
